spring:
  application:
    name: csob-ca

  # ---- Persistence (H2 for this milestone) ----------------------------------
  datasource:
    url: "jdbc:h2:mem:csob-ca;DB_CLOSE_DELAY=-1;MODE=LEGACY"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      # Flyway owns schema; Hibernate must not touch it.
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: "classpath:db/migration"
    baseline-on-migrate: false

logging:
  level:
    com.csob.ca: INFO

server:
  port: 8082
  servlet:
    context-path: /api

# Profiles: local | dev | staging | prod
# Secrets are NEVER committed. Load via optional:file imports or environment variables.
spring.config:
  import:
    - optional:file:./config/application-secret.yml

ca:
  checklist:
    defaultVersion: v1.0
  prompt:
    defaultVersion: v1
  tools:
    documents:
      # ----- source selection ----------------------------------------------
      # FILESYSTEM (default) | CSOB
      # FILESYSTEM keeps smoke + local dev working without external creds.
      # CSOB selects CsobDocumentMetadataSource — STRUCTURE ONLY today; calls
      # throw UnsupportedOperationException until the CSOB endpoint contract
      # lands. See CsobDocumentMetadataSource Javadoc for the exact mapping
      # that needs to be implemented.
      provider: FILESYSTEM

      # ----- FILESYSTEM provider config ------------------------------------
      # Each party's docs live in {root}/{partyId}.json.
      # Default is relative to spring-boot-maven-plugin's workingDirectory
      # (the ca-api module dir), so ../sample-data/documents = backend/sample-data/documents.
      root: "../sample-data/documents"

      # ----- CSOB provider config (placeholders — NOT YET OPERATIONAL) -----
      # Fill these in when the CSOB integration team shares the API contract.
      # Until then, leaving base-url empty AND provider=FILESYSTEM keeps
      # everything working; setting provider=CSOB without base-url fails
      # loudly at startup.
      csob:
        base-url: ""             # e.g. https://csob-internal.example.com/api/documents
        timeout-seconds: 30      # per-request HTTP timeout
        max-attempts: 2          # inclusive; 1 = no retry, 3 = cap
        auth-token: "${CSOB_DOCUMENTS_AUTH_TOKEN:}"   # env var; NEVER commit the real value
  ai:
    provider: STUB             # STUB | HTTP  (override per profile)
    # HttpModelClient settings. Ignored when provider = STUB.
    http:
      endpoint: ""             # e.g. https://ai-proxy.internal/v1/ca/summarise
      timeout-seconds: 30      # per-request HTTP timeout
      max-attempts: 2          # inclusive; 1 = no retry, 3 = cap
      auth-token: "${CA_AI_HTTP_TOKEN:}"   # load from env var; NEVER commit the real value
    # Pipeline-level retry (reserved for InvokeAiStep; HttpModelClient has its own transport retry).
    retry:
      enabled: false
      maxAttempts: 1
  audit:
    retentionDays: 2555  # 7 years; confirm per regulatory policy
  review:
    fourEyesRequiredForSeverity: CRITICAL
